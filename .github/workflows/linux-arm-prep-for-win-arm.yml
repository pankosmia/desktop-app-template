name: Linux arm Prep for Win arm

on:
  workflow_call:
    inputs:
      runner:
        description: 'The GitHub runner to use (e.g., ubuntu-20.04, ubuntu-22.04)'
        required: true
        type: string
      branches:
        required: true
        type: string
      log_level:
        required: true
        type: string
    outputs:
      tgz-name:
        description: "Name of the generated TGZ file"
        value: ${{ jobs.build.outputs.tgz-name }}
      deb-name:
        description: "Name of the generated .deb file"
        value: ${{ jobs.build.outputs.deb-name }}

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    outputs:
      tgz-name: ${{ steps.get-tgz-name.outputs.tgz-name }}
      deb-name: ${{ steps.get-deb-name.outputs.deb-name }}
      
    # Set process.env.CI to false to prevent treating warnings as errors
    env:
      CI: false
      BRANCHES: ${{ inputs.branches }}
      LOG_LEVEL: ${{ inputs.log_level }}

    steps:
      # Show branches
      - name: Show BRANCHES
        run: echo "BRANCHES = $BRANCHES"

      # Show log level
      - name: Show LOG LEVEL
        run: echo "LOG_LEVEL = $LOG_LEVEL"

      # Turn off re-runs
      - name: No re-runs please
        run: |
         if [ "$GITHUB_RUN_ATTEMPT" -gt 1 ]; then
            echo "No re-runs. They use the commit SHA and git ref of the original event that triggered the workflow run. However, that does not extend to client and resource repos which may expect a more recent panksomia-web."
            echo "Start a new workflow run instead."
            exit 1
          else
            echo "NOT a re-run"
          fi

      # Rust
      - name: Set up Rust
        id: set-up-rust
        uses: moonrepo/setup-rust@v1
        timeout-minutes: 15  # Adjust the value as needed

      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Specify node.js version
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.5'

      # Install the repository
      - name: Install this repo
        run: npm ci

      # Grant execute permissions for the shell and bash scripts
      - name: Make scripts executable
        run: |
          chmod +x ./linux/scripts/app_setup.bsh
          chmod +x ./linux/scripts/clone.bsh
          chmod +x ./linux/scripts/build_clients.bsh

      # Include an argument to not add the server to this buildSpec.json
      - name: Run app_setup.bsh
        working-directory: ./linux/scripts
        run: ./app_setup.bsh --gha-pre-win-arm

      - name: Run clone.bsh
        working-directory: ./linux/scripts
        run: ./clone.bsh

      - name: Build ${{ inputs.branches }} clients
        working-directory: ./linux/scripts
        run: ./build_clients.bsh -f "$BRANCHES"

      # Include an argument skipping the linux server
      - name: Run build.js
        working-directory: ./linux/scripts
        run: node ./build.js gha-pre-win-arm

      # Package /linux/build/lib/ for the Windows ARM job to consume
      # in place of its clone.bat / build_clients.bat steps.
      - name: Upload linux build/lib for Windows ARM
        if: ${{ inputs.runner == 'ubuntu-22.04-arm' || contains(inputs.runner, 'arm') }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm-build-lib
          path: ./linux/build/lib/
          if-no-files-found: error
          retention-days: 1
